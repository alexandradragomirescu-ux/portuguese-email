<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Email a Portuguese Personality</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --border: rgba(0, 0, 0, 0.12);
    --border-strong: rgba(0, 0, 0, 0.22);
    --text: #1a1a1a;
    --text-muted: #5f5e5a;
    --text-faint: #888780;
    --accent: #185fa5;
    --accent-bg: #E6F1FB;
    --success: #1d9e75;
    --success-bg: #E1F5EE;
    --danger: #a32d2d;
    --danger-bg: #FCEBEB;
    --amber: #854f0b;
    --amber-bg: #FAEEDA;
    --purple: #534ab7;
    --purple-bg: #EEEDFE;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 15px;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }
  .lang-bar {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .lang-btn {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
  }
  h1 { font-size: 26px; font-weight: 500; margin: 0 0 4px; }
  .subtitle { font-size: 14px; color: var(--text-muted); margin: 0 0 24px; }
  .grid-people {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .person-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .person-card:hover { border-color: var(--border-strong); }
  .person-card.selected {
    border: 2px solid var(--accent);
    padding: 11px;
  }
  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 13px;
    flex-shrink: 0;
  }
  .person-name { font-size: 14px; font-weight: 500; margin: 0; line-height: 1.2; }
  .person-role { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; line-height: 1.3; }
  .bio-card {
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.6;
  }
  .bio-title { font-weight: 500; margin: 0 0 6px; font-size: 15px; }
  .compose-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 16px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .field-label {
    font-size: 13px;
    color: var(--text-muted);
    width: 80px;
    flex-shrink: 0;
  }
  .field-value { font-size: 14px; flex: 1; }
  .text-input, .message-input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    padding: 4px 0;
  }
  .message-input {
    min-height: 130px;
    resize: vertical;
    line-height: 1.6;
    margin-top: 10px;
    padding: 8px 0;
  }
  .action-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .status {
    font-size: 13px;
    color: var(--text-muted);
    margin-right: auto;
  }
  .send-btn {
    padding: 9px 18px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .send-btn:hover:not(:disabled) { opacity: 0.88; }
  .placeholder {
    text-align: center;
    padding: 18px;
    color: var(--text-muted);
    font-size: 14px;
    background: var(--surface-2);
    border-radius: var(--radius-lg);
    margin-bottom: 20px;
  }
  .reply-card, .feedback-card, .quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
  }
  .reply-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .reply-from { font-size: 14px; font-weight: 500; margin: 0; }
  .reply-meta { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; }
  .reply-body { font-size: 14px; line-height: 1.75; white-space: pre-wrap; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    font-size: 14px;
    margin: 0 0 10px;
  }
  .feedback-card { border-left: 3px solid var(--purple); }
  .feedback-card .section-header { color: var(--purple); }
  .feedback-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .feedback-metric {
    background: var(--purple-bg);
    padding: 8px 10px;
    border-radius: var(--radius-md);
  }
  .feedback-metric .label {
    font-size: 11px;
    color: var(--purple);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .feedback-metric .value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .feedback-section { margin-bottom: 10px; }
  .feedback-section:last-child { margin-bottom: 0; }
  .feedback-section .title {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    margin: 0 0 4px;
  }
  .feedback-section ul { margin: 0; padding-left: 18px; font-size: 13.5px; line-height: 1.6; }
  .feedback-section ul li { margin-bottom: 3px; }
  .feedback-section p { margin: 0; font-size: 13.5px; line-height: 1.6; }
  .quote-card {
    background: var(--surface-2);
    border-left: 3px solid var(--amber);
    font-family: Georgia, serif;
  }
  .quote-card .quote-text {
    font-size: 16px;
    line-height: 1.6;
    font-style: italic;
    margin: 0 0 8px;
    color: var(--text);
  }
  .quote-card .quote-author {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--font);
    margin: 0;
  }
  .error-box {
    color: var(--danger);
    font-size: 13px;
    padding: 8px 12px;
    background: var(--danger-bg);
    border-radius: var(--radius-md);
  }
  .debug-line {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
    font-family: monospace;
    word-break: break-all;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="lang-bar">
    <button class="lang-btn active" data-lang="en">English</button>
    <button class="lang-btn" data-lang="ro">Română</button>
    <button class="lang-btn" data-lang="pt">Português</button>
  </div>

  <h1 id="appTitle">Write to a Portuguese personality</h1>
  <p class="subtitle" id="appSubtitle">Pick a person, write your email, and receive a reply, an assessment, and a motivational quote.</p>

  <div class="grid-people" id="peopleGrid"></div>
  <div id="bioBox"></div>

  <div class="compose-card" id="composeCard" style="display:none;">
    <div class="field-row">
      <span class="field-label" id="lblFrom">From</span>
      <input class="text-input" id="fromInput" placeholder="your.name@school.com" />
    </div>
    <div class="field-row">
      <span class="field-label" id="lblTo">To</span>
      <span class="field-value" id="toValue"></span>
    </div>
    <div class="field-row">
      <span class="field-label" id="lblSubject">Subject</span>
      <input class="text-input" id="subjectInput" placeholder="Your subject here..." />
    </div>
    <textarea class="message-input" id="messageInput" placeholder="Write your message here..."></textarea>
    <div class="action-row">
      <span class="status" id="statusText"></span>
      <button class="send-btn" id="sendBtn"><span id="sendLabel">Send email</span></button>
    </div>
  </div>

  <div id="resultArea"></div>

</div>

let currentLang = 'en';
let selectedPerson = null;
let isSending = false;

function emailFor(p) { return 'press@' + p.id + '.pt'; }

function renderPeople() {
  const grid = document.getElementById('peopleGrid');
  grid.innerHTML = '';
  PEOPLE.forEach(p => {
    const card = document.createElement('div');
    card.className = 'person-card' + (selectedPerson && selectedPerson.id === p.id ? ' selected' : '');
    card.innerHTML =
      '<div class="avatar" style="background:' + p.color.bg + ';color:' + p.color.fg + ';">' + p.initials + '</div>' +
      '<div style="min-width:0;">' +
      '<p class="person-name">' + p.name + '</p>' +
      '<p class="person-role">' + p.role[currentLang] + '</p>' +
      '</div>';
    card.addEventListener('click', () => selectPerson(p));
    grid.appendChild(card);
  });
}

function selectPerson(p) {
  selectedPerson = p;
  renderPeople();
  renderBio();
  renderCompose();
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('statusText').innerHTML = '';
}

function renderBio() {
  const t = I18N[currentLang];
  const box = document.getElementById('bioBox');
  if (!selectedPerson) {
    box.innerHTML = '<div class="placeholder">' + t.pickFirst + '</div>';
    return;
  }
  box.innerHTML =
    '<div class="bio-card">' +
    '<p class="bio-title">' + t.bioHeading + ' ' + selectedPerson.name + '</p>' +
    '<div>' + selectedPerson.bio[currentLang] + '</div>' +
    '</div>';
}

function renderCompose() {
  const t = I18N[currentLang];
  const card = document.getElementById('composeCard');
  if (!selectedPerson) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('lblFrom').textContent = t.from;
  document.getElementById('lblTo').textContent = t.to;
  document.getElementById('lblSubject').textContent = t.subject;
  document.getElementById('fromInput').placeholder = t.placeholderFrom;
  document.getElementById('subjectInput').placeholder = t.placeholderSubject;
  document.getElementById('messageInput').placeholder = t.placeholderMessage;
  document.getElementById('sendLabel').textContent = t.send;
  document.getElementById('toValue').textContent = selectedPerson.name + ' <' + emailFor(selectedPerson) + '>';
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  const t = I18N[lang];
  document.getElementById('appTitle').textContent = t.title;
  document.getElementById('appSubtitle').textContent = t.subtitle;
  renderPeople();
  renderBio();
  renderCompose();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

async function callApi(system, userPrompt, maxTokens) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system,
      messages: [{ role: 'user', content: userPrompt }],
      max_tokens: maxTokens || 1000
    })
  });
  const raw = await res.text();
  let data;
  try { data = JSON.parse(raw); } catch (e) {
    throw new Error('Bad JSON. Status ' + res.status + ': ' + raw.slice(0, 200));
  }
  if (!res.ok || data.error) {
    const msg = data.error ? (data.error.message || JSON.stringify(data.error)) : ('HTTP ' + res.status);
    throw new Error(msg);
  }
  const text = (data.content || [])
    .filter(b => b && b.type === 'text' && typeof b.text === 'string')
    .map(b => b.text)
    .join('\n')
    .trim();
  if (!text) throw new Error('Empty reply');
  return text;
}

function langName(code) {
  return { en: 'English', ro: 'Romanian', pt: 'European Portuguese' }[code];
}

async function generatePRReply(fromEmail, subject, message) {
  const lang = langName(currentLang);
  const system = selectedPerson.persona + '\n\n' +
    'You write a reply email to a student fan, ENTIRELY in ' + lang + '. ' +
    'Match the tone of the student\'s message and address what they actually wrote. ' +
    'Keep the reply between 120 and 200 words. ' +
    'Use a real email format: greeting, 2-3 short paragraphs, sign-off, and signature. ' +
    'Never break character. Never mention you are an AI. ' +
    'If the personality is deceased, write tactfully on behalf of the foundation or museum without pretending the person is alive. ' +
    'Output ONLY the email body, no preface.';
  const user =
    'Student email:\nFrom: ' + fromEmail + '\nTo: ' + selectedPerson.name + ' <' + emailFor(selectedPerson) + '>\n' +
    'Subject: ' + subject + '\n\n' + message + '\n\n' +
    'Write the PR team reply now, in ' + lang + '. Email body only.';
  return await callApi(system, user, 900);
}

async function generateAssessment(subject, message) {
  const lang = langName(currentLang);
  const system =
    'You are an experienced, encouraging language teacher. ' +
    'A student wrote an email in English (or another language) to a Portuguese celebrity. ' +
    'You evaluate the student\'s email and respond in ' + lang + '. ' +
    'Be warm and constructive. Never harsh. ' +
    'Return ONLY valid JSON, no markdown fences, with this exact shape:\n' +
    '{\n' +
    '  "grammar": "short label like Excellent, Good, Needs work",\n' +
    '  "tone": "short label like Polite, Casual, Too formal",\n' +
    '  "structure": "short label like Clear, Brief, Could expand",\n' +
    '  "cefr": "estimated CEFR level like A2, B1, B2",\n' +
    '  "strengths": ["short bullet", "short bullet"],\n' +
    '  "improvements": ["short concrete bullet", "short concrete bullet"],\n' +
    '  "encouragement": "one warm sentence in ' + lang + '"\n' +
    '}';
  const user =
    'Student wrote this email (subject + body):\n\n' +
    'Subject: ' + subject + '\n\n' + message + '\n\n' +
    'Evaluate it. Return JSON only.';
  const raw = await callApi(system, user, 700);
  let cleaned = raw.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
  }
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace >= 0 && lastBrace > firstBrace) {
    cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  }
  return JSON.parse(cleaned);
}

async function generateQuote() {
  const lang = langName(currentLang);
  const system =
    'You are a careful curator of motivational quotes. ' +
    'Provide a short, real or stylistically authentic quote relevant to the personality and theme requested. ' +
    'Output the quote translated into ' + lang + '. ' +
    'Return ONLY valid JSON, no markdown fences:\n' +
    '{\n' +
    '  "quote": "the quote text in ' + lang + ', under 30 words",\n' +
    '  "author": "' + selectedPerson.name + '"\n' +
    '}';
  const user = 'Give me ' + selectedPerson.quoteTheme + '. Return JSON only.';
  const raw = await callApi(system, user, 400);
  let cleaned = raw.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
  }
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');
  if (firstBrace >= 0 && lastBrace > firstBrace) {
    cleaned = cleaned.slice(firstBrace, lastBrace + 1);
  }
  return JSON.parse(cleaned);
}

async function sendEmail() {
  if (isSending) return;
  const t = I18N[currentLang];
  const statusEl = document.getElementById('statusText');
  const fromEmail = document.getElementById('fromInput').value.trim();
  const subject = document.getElementById('subjectInput').value.trim();
  const message = document.getElementById('messageInput').value.trim();

  if (!fromEmail || !subject || !message) {
    statusEl.innerHTML = '<span class="error-box">' + t.needFields + '</span>';
    return;
  }

  isSending = true;
  document.getElementById('sendBtn').disabled = true;
  statusEl.innerHTML = '<span class="loading-dots">' + t.sending + '</span>';
  document.getElementById('resultArea').innerHTML = '';

  try {
    const [replyText, assessment, quote] = await Promise.all([
      generatePRReply(fromEmail, subject, message),
      generateAssessment(subject, message),
      generateQuote()
    ]);
    renderAll(subject, replyText, assessment, quote);
    statusEl.innerHTML = '<span style="color: var(--success);">✓ ' + t.sent + '</span>';
  } catch (err) {
    statusEl.innerHTML =
      '<span class="error-box">' + t.error + '</span>' +
      '<div class="debug-line">' + escapeHtml(String(err.message || err)).slice(0, 280) + '</div>';
  } finally {
    isSending = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function renderAll(subject, replyText, assessment, quote) {
  const t = I18N[currentLang];
  const locale = currentLang === 'en' ? 'en-GB' : (currentLang === 'ro' ? 'ro-RO' : 'pt-PT');
  const now = new Date().toLocaleString(locale, { dateStyle: 'medium', timeStyle: 'short' });

  let html = '';
  html +=
    '<div class="reply-card">' +
      '<div class="reply-header">' +
        '<div class="avatar" style="background:' + selectedPerson.color.bg + ';color:' + selectedPerson.color.fg + ';">' +
          selectedPerson.initials +
        '</div>' +
        '<div>' +
          '<p class="reply-from">Re: ' + escapeHtml(subject) + '</p>' +
          '<p class="reply-meta">' + selectedPerson.name + ' · ' + t.replyMeta + ' · ' + now + '</p>' +
        '</div>' +
      '</div>' +
      '<div class="reply-body">' + escapeHtml(replyText) + '</div>' +
    '</div>';

  if (assessment) {
    html +=
      '<div class="feedback-card">' +
        '<p class="section-header">📝 ' + t.assessmentTitle + '</p>' +
        '<div class="feedback-grid">' +
          metricCard(t.metricGrammar, assessment.grammar) +
          metricCard(t.metricTone, assessment.tone) +
          metricCard(t.metricStructure, assessment.structure) +
          metricCard(t.metricLevel, assessment.cefr) +
        '</div>' +
        feedbackList(t.strengths, assessment.strengths) +
        feedbackList(t.improvements, assessment.improvements) +
        (assessment.encouragement ?
          '<div class="feedback-section"><p class="title">' + t.encouragement + '</p><p>' +
          escapeHtml(assessment.encouragement) + '</p></div>' : '') +
      '</div>';
  }

  if (quote) {
    html +=
      '<div class="quote-card">' +
        '<p class="section-header" style="color: var(--amber); font-family: var(--font);">✨ ' + t.quoteTitle + '</p>' +
        '<p class="quote-text">"' + escapeHtml(quote.quote || '') + '"</p>' +
        '<p class="quote-author">— ' + escapeHtml(quote.author || selectedPerson.name) + '</p>' +
      '</div>';
  }

  document.getElementById('resultArea').innerHTML = html;
}

function metricCard(label, value) {
  return '<div class="feedback-metric"><div class="label">' + escapeHtml(label) +
    '</div><div class="value">' + escapeHtml(value || '—') + '</div></div>';
}

function feedbackList(title, items) {
  if (!Array.isArray(items) || items.length === 0) return '';
  let html = '<div class="feedback-section"><p class="title">' + escapeHtml(title) + '</p><ul>';
  items.forEach(i => { html += '<li>' + escapeHtml(i) + '</li>'; });
  html += '</ul></div>';
  return html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
  );
}

document.getElementById('sendBtn').addEventListener('click', sendEmail);

renderPeople();
renderBio();
</script>
